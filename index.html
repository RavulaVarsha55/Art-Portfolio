<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Varsha's Art Portfolio</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Quicksand:wght@400;600;700&family=Patrick+Hand&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="hero">
      <div class="overlay"></div>
      <div class="hero-content">
        <p class="tag">Handmade Paintings</p>
        <p class="intro">
          A soft gallery for my painting journey.
        </p>
        <a class="btn" href="#gallery">View Gallery</a>
      </div>
    </header>

    <main>
      <section id="gallery" class="gallery-section">
        <h2>Gallery</h2>
        <p class="subtext">Click any painting to view larger.</p>
        <div id="galleryGrid" class="gallery-grid"></div>
      </section>
    </main>

    <div id="lightbox" class="lightbox hidden" aria-hidden="true">
      <button id="closeLightbox" class="close-btn" aria-label="Close image">×</button>
      <img id="lightboxImg" src="" alt="Expanded painting" />
      <p id="lightboxCaption"></p>
    </div>

    <footer>
      <p>Made with HTML, CSS, JS • Hosted on GitHub Pages</p>
    </footer>

    <script src="files/paintings.js"></script>
    <script src="script.js"></script>
  </body>
</html>
